<svg width="480" height="920" viewBox="0 0 480 920" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="480" height="920" fill="#ffffff"/>
  <defs>
    <marker id="arrow3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Step template: x=40,width=400,height=80, spacing 110 -->

  <rect x="40" y="20" width="400" height="80" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="60" y="48" font-size="13" fill="#4c1d95" font-weight="bold">1. Bootstrap du state distant (une seule fois)</text>
  <text x="60" y="68" font-size="11" fill="#4c1d95">Creer le bucket S3 + table DynamoDB, region eu-west-1</text>
  <text x="60" y="86" font-size="11" fill="#6d28d9">dossier separe : lock-booking-tfstate-bootstrap</text>
  <line x1="240" y1="100" x2="240" y2="128" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <rect x="40" y="130" width="400" height="70" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="60" y="156" font-size="13" fill="#1e3a8a" font-weight="bold">2. terraform apply -target=module.vpc</text>
  <text x="60" y="176" font-size="11" fill="#1e3a8a">VPC, subnets publics/prives, NAT Gateway, IGW</text>
  <line x1="240" y1="200" x2="240" y2="228" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <rect x="40" y="230" width="400" height="70" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="60" y="256" font-size="13" fill="#1e3a8a" font-weight="bold">3. terraform apply -target=module.alb,module.ecr</text>
  <text x="60" y="276" font-size="11" fill="#1e3a8a">Load balancer + registre Docker (pas de dependance a RDS)</text>
  <line x1="240" y1="300" x2="240" y2="328" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <rect x="40" y="330" width="400" height="70" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="60" y="356" font-size="13" fill="#4c1d95" font-weight="bold">4. terraform apply -target=module.rds</text>
  <text x="60" y="376" font-size="11" fill="#4c1d95">PostgreSQL 16, subnets prives, mot de passe sans / @ " espace</text>
  <line x1="240" y1="400" x2="240" y2="428" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <rect x="40" y="430" width="400" height="70" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="60" y="456" font-size="13" fill="#1e3a8a" font-weight="bold">5. terraform apply -target=module.frontend</text>
  <text x="60" y="476" font-size="11" fill="#1e3a8a">Bucket S3 + distribution CloudFront (propagation 5-15 min)</text>
  <line x1="240" y1="500" x2="240" y2="528" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <rect x="40" y="530" width="400" height="80" rx="10" fill="#f9fafb" stroke="#6b7280" stroke-width="1"/>
  <text x="60" y="556" font-size="13" fill="#111827" font-weight="bold">6. Build + push de l'image Docker backend</text>
  <text x="60" y="576" font-size="11" fill="#374151">docker build, docker tag, docker push vers ECR</text>
  <text x="60" y="594" font-size="11" fill="#6b7280">necessite Docker Desktop installe localement</text>
  <line x1="240" y1="610" x2="240" y2="638" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <rect x="40" y="640" width="400" height="80" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="60" y="666" font-size="13" fill="#1e3a8a" font-weight="bold">7. terraform apply -target=module.ecs</text>
  <text x="60" y="686" font-size="11" fill="#1e3a8a">Secrets Manager, cluster, task definition, service Fargate</text>
  <text x="60" y="704" font-size="11" fill="#1d4ed8">image doit deja exister sur ECR (etape 6)</text>
  <line x1="240" y1="720" x2="240" y2="748" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <rect x="40" y="750" width="400" height="90" rx="10" fill="#f9fafb" stroke="#6b7280" stroke-width="1"/>
  <text x="60" y="776" font-size="13" fill="#111827" font-weight="bold">8. Build + publication du frontend</text>
  <text x="60" y="796" font-size="11" fill="#374151">npm run build -&gt; aws s3 sync ./dist -&gt; bucket</text>
  <text x="60" y="814" font-size="11" fill="#374151">aws cloudfront create-invalidation --paths "/*"</text>
  <line x1="240" y1="840" x2="240" y2="862" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <rect x="90" y="864" width="300" height="46" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="1"/>
  <text x="240" y="892" text-anchor="middle" font-size="13" fill="#065f46" font-weight="bold">Site en ligne : /api/health -&gt; ok:true</text>
</svg>
