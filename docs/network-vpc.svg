<svg width="700" height="560" viewBox="0 0 700 560" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="700" height="560" fill="#ffffff"/>
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="260" y="20" width="180" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="350" y="45" text-anchor="middle" font-size="13" fill="#1e3a8a">Internet Gateway</text>
  <line x1="350" y1="60" x2="350" y2="88" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <rect x="70" y="90" width="560" height="400" rx="20" fill="#f9fafb" stroke="#6b7280" stroke-width="1"/>
  <text x="90" y="114" font-size="14" fill="#111827" font-weight="bold">VPC lock-booking-prod — 10.0.0.0/16 (eu-west-1)</text>

  <rect x="100" y="142" width="250" height="320" rx="14" fill="#ffffff" stroke="#9ca3af" stroke-width="1"/>
  <text x="120" y="164" font-size="12" fill="#374151">eu-west-1a</text>

  <rect x="370" y="142" width="250" height="320" rx="14" fill="#ffffff" stroke="#9ca3af" stroke-width="1"/>
  <text x="390" y="164" font-size="12" fill="#374151">eu-west-1b</text>

  <!-- AZ-a public -->
  <rect x="120" y="182" width="210" height="90" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="225" y="204" text-anchor="middle" font-size="13" fill="#1e3a8a" font-weight="bold">Subnet public 10.0.0.0/24</text>
  <text x="225" y="224" text-anchor="middle" font-size="11" fill="#1e3a8a">ALB + NAT Gateway</text>
  <text x="225" y="242" text-anchor="middle" font-size="11" fill="#1d4ed8">1 EIP attachee</text>

  <!-- AZ-a private -->
  <rect x="120" y="292" width="210" height="130" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="225" y="314" text-anchor="middle" font-size="13" fill="#4c1d95" font-weight="bold">Subnet prive 10.0.10.0/24</text>
  <text x="225" y="336" text-anchor="middle" font-size="11" fill="#4c1d95">ECS Fargate</text>
  <text x="225" y="354" text-anchor="middle" font-size="11" fill="#4c1d95">RDS PostgreSQL</text>
  <line x1="225" y1="292" x2="225" y2="274" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- AZ-b public -->
  <rect x="390" y="182" width="210" height="90" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="495" y="204" text-anchor="middle" font-size="13" fill="#1e3a8a" font-weight="bold">Subnet public 10.0.1.0/24</text>
  <text x="495" y="224" text-anchor="middle" font-size="11" fill="#1e3a8a">ALB</text>
  <text x="495" y="242" text-anchor="middle" font-size="11" fill="#1d4ed8">pas de NAT ici</text>

  <!-- AZ-b private -->
  <rect x="390" y="292" width="210" height="130" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="495" y="314" text-anchor="middle" font-size="13" fill="#4c1d95" font-weight="bold">Subnet prive 10.0.11.0/24</text>
  <text x="495" y="336" text-anchor="middle" font-size="11" fill="#4c1d95">ECS Fargate</text>
  <text x="495" y="354" text-anchor="middle" font-size="11" fill="#4c1d95">RDS PostgreSQL</text>
  <line x1="495" y1="292" x2="495" y2="274" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <text x="350" y="512" text-anchor="middle" font-size="12" fill="#6b7280">Bleu = subnet public  ·  Violet = subnet prive</text>
  <text x="350" y="530" text-anchor="middle" font-size="12" fill="#6b7280">1 seule table de routage privee, partagee, pointant vers le NAT de 1a</text>
</svg>
