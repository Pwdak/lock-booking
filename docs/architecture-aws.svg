<svg width="700" height="500" viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="700" height="500" fill="#ffffff"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- User -->
  <rect x="250" y="20" width="200" height="44" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="1"/>
  <text x="350" y="46" text-anchor="middle" font-size="14" fill="#111827">Utilisateur (navigateur)</text>
  <line x1="350" y1="64" x2="350" y2="98" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- CloudFront -->
  <rect x="210" y="100" width="280" height="56" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="350" y="122" text-anchor="middle" font-size="14" fill="#1e3a8a" font-weight="bold">Amazon CloudFront</text>
  <text x="350" y="142" text-anchor="middle" font-size="12" fill="#1e3a8a">CDN + HTTPS, routage par chemin</text>

  <line x1="300" y1="156" x2="190" y2="192" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="156" x2="510" y2="192" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- S3 frontend -->
  <rect x="80" y="196" width="220" height="70" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="190" y="220" text-anchor="middle" font-size="14" fill="#4c1d95" font-weight="bold">S3 (frontend)</text>
  <text x="190" y="238" text-anchor="middle" font-size="12" fill="#4c1d95">index.html (SPA React)</text>
  <text x="190" y="254" text-anchor="middle" font-size="11" fill="#6d28d9">origine par defaut, prive + OAC</text>

  <!-- ALB -->
  <rect x="400" y="196" width="220" height="70" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="510" y="220" text-anchor="middle" font-size="14" fill="#1e3a8a" font-weight="bold">Application Load Balancer</text>
  <text x="510" y="238" text-anchor="middle" font-size="12" fill="#1e3a8a">chemin /api/*</text>
  <text x="510" y="254" text-anchor="middle" font-size="11" fill="#1d4ed8">port 80 -&gt; cible port 4000</text>

  <line x1="510" y1="266" x2="510" y2="304" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ECS -->
  <rect x="400" y="306" width="220" height="64" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="510" y="330" text-anchor="middle" font-size="14" fill="#1e3a8a" font-weight="bold">ECS Fargate</text>
  <text x="510" y="350" text-anchor="middle" font-size="12" fill="#1e3a8a">Backend Node/Express (subnet prive)</text>

  <line x1="440" y1="370" x2="170" y2="406" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="370" x2="380" y2="406" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="370" x2="590" y2="406" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ECR -->
  <rect x="80" y="408" width="180" height="64" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="170" y="432" text-anchor="middle" font-size="13" fill="#1e3a8a" font-weight="bold">ECR</text>
  <text x="170" y="450" text-anchor="middle" font-size="11" fill="#1e3a8a">image Docker backend</text>

  <!-- RDS -->
  <rect x="290" y="408" width="180" height="64" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="380" y="432" text-anchor="middle" font-size="13" fill="#4c1d95" font-weight="bold">RDS PostgreSQL</text>
  <text x="380" y="450" text-anchor="middle" font-size="11" fill="#4c1d95">subnet prive</text>

  <!-- Secrets Manager -->
  <rect x="500" y="408" width="180" height="64" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="590" y="432" text-anchor="middle" font-size="13" fill="#4c1d95" font-weight="bold">Secrets Manager</text>
  <text x="590" y="450" text-anchor="middle" font-size="11" fill="#4c1d95">DATABASE_URL, APP_SECRET...</text>

  <text x="350" y="490" text-anchor="middle" font-size="11" fill="#6b7280">Bleu = reseau/compute  ·  Violet = donnees/secrets</text>
</svg>
